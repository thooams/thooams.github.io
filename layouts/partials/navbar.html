<div class="navbar bg-base-200 border-b border-base-300 px-6 sticky top-0 z-50">
  <div class="flex-1">
    <a href="{{ site.Home.Permalink }}" class="text-xl font-bold tracking-wide hover:text-primary transition-colors">
      Thomas HUMMEL
    </a>
  </div>

  <!-- Desktop menu -->
  <div class="flex-none gap-1 hidden md:flex">
    {{ range site.Menus.main }}
    {{ if ne .Name "Home" }}
    <a href="{{ .URL }}" class="btn btn-ghost btn-sm">{{ .Name }}</a>
    {{ end }}
    {{ end }}
  </div>

  <!-- Mobile hamburger -->
  <div class="flex-none md:hidden">
    <div class="dropdown dropdown-end">
      <div tabindex="0" role="button" class="btn btn-ghost btn-sm">
        <i class="fa-solid fa-bars text-lg"></i>
      </div>
      <ul tabindex="0" class="dropdown-content menu bg-base-200 rounded-box z-[1] w-52 p-2 shadow border border-base-300">
        {{ range site.Menus.main }}
        <li><a href="{{ .URL }}">{{ .Name }}</a></li>
        {{ end }}
      </ul>
    </div>
  </div>
</div>

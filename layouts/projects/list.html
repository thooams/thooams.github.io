{{ define "main" }}

<section class="spectral-section-accent py-20 text-base-content text-center">
  <div class="container mx-auto px-6">
    <h1 class="text-4xl md:text-5xl font-bold mb-3">Projects</h1>
    <p class="text-xl opacity-75">My open source and professional work</p>
  </div>
</section>

<section class="py-16 bg-base-100">
  <div class="container mx-auto px-6 max-w-4xl">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
      {{ range $i, $p := (sort .Pages "Weight") }}
      <a href="{{ $p.Permalink }}" class="card bg-base-200 border border-base-300 hover:border-primary transition-colors group">
        {{ with $p.Params.image }}
        <figure class="overflow-hidden h-48">
          <img src="{{ . }}" alt="{{ $p.Title }}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300" {{ if eq $i 0 }}fetchpriority="high" loading="eager"{{ else }}loading="lazy"{{ end }} />
        </figure>
        {{ end }}
        <div class="card-body">
          <h2 class="card-title text-base-content">{{ $p.Title }}</h2>
          <p class="text-base-content/60 text-sm">{{ $p.Params.description }}</p>
          <div class="card-actions justify-end mt-2">
            <span class="btn btn-primary btn-sm">{{ i18n "learn_more" }}</span>
          </div>
        </div>
      </a>
      {{ end }}
    </div>
  </div>
</section>

{{ end }}
